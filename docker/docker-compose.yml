services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: aaa
      POSTGRES_USER: aaa
      POSTGRES_PASSWORD: aaa_dev_password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

  api:
    build:
      context: ..
      dockerfile: docker/api.Dockerfile
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: development
      LOG_LEVEL: debug
      API_HOST: 0.0.0.0
      API_PORT: "3001"
      DATABASE_URL: postgresql://aaa:aaa_dev_password@postgres:5432/aaa
      REDIS_URL: redis://redis:6379
      OPENAI_API_KEY: ${OPENAI_API_KEY:-sk-placeholder}
      S3_BUCKET: aaa-uploads
      S3_REGION: us-east-1
    depends_on:
      - postgres
      - redis

  worker:
    build:
      context: ..
      dockerfile: docker/worker.Dockerfile
    environment:
      NODE_ENV: development
      LOG_LEVEL: debug
      DATABASE_URL: postgresql://aaa:aaa_dev_password@postgres:5432/aaa
      REDIS_URL: redis://redis:6379
      OPENAI_API_KEY: ${OPENAI_API_KEY:-sk-placeholder}
    depends_on:
      - postgres
      - redis

  web:
    build:
      context: ..
      dockerfile: docker/web.Dockerfile
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://api:3001
    depends_on:
      - api

volumes:
  pgdata:
  redisdata:
