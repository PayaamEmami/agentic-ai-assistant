name: agentic-ai-assistant

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: aaa
      POSTGRES_USER: aaa
      POSTGRES_PASSWORD: aaa_dev_password
    ports:
      - "${LOCAL_POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "${LOCAL_REDIS_PORT:-6379}:6379"
    volumes:
      - redisdata:/data

  api:
    build:
      context: ..
      dockerfile: docker/api.Dockerfile
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: development
      LOG_LEVEL: debug
      API_HOST: 0.0.0.0
      API_PORT: "3001"
      DATABASE_URL: postgresql://aaa:aaa_dev_password@postgres:5432/aaa
      REDIS_URL: redis://redis:6379
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      OTEL_SERVICE_NAMESPACE: aaa
      LOG_FILE_ENABLED: "false"
      OPENAI_API_KEY: ${OPENAI_API_KEY:-sk-placeholder}
      S3_BUCKET: aaa-uploads
      S3_REGION: us-west-1
    depends_on:
      - postgres
      - redis

  worker:
    build:
      context: ..
      dockerfile: docker/worker.Dockerfile
    environment:
      NODE_ENV: development
      LOG_LEVEL: debug
      DATABASE_URL: postgresql://aaa:aaa_dev_password@postgres:5432/aaa
      REDIS_URL: redis://redis:6379
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      OTEL_SERVICE_NAMESPACE: aaa
      LOG_FILE_ENABLED: "false"
      WORKER_OBSERVABILITY_HOST: 0.0.0.0
      WORKER_OBSERVABILITY_PORT: "9464"
      OPENAI_API_KEY: ${OPENAI_API_KEY:-sk-placeholder}
    depends_on:
      - postgres
      - redis

  web:
    build:
      context: ..
      dockerfile: docker/web.Dockerfile
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://api:3001
    depends_on:
      - api

  prometheus:
    image: prom/prometheus:v3.4.2
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./observability/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro

  loki:
    image: grafana/loki:3.2.1
    ports:
      - "3100:3100"
    command: ["-config.file=/etc/loki/config.yml"]
    volumes:
      - ./observability/loki/config.yml:/etc/loki/config.yml:ro

  tempo:
    image: grafana/tempo:2.7.1
    ports:
      - "3200:3200"
    command: ["-config.file=/etc/tempo/config.yml"]
    volumes:
      - ./observability/tempo/config.yml:/etc/tempo/config.yml:ro

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.120.0
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    ports:
      - "${LOCAL_OTEL_HTTP_PORT:-4318}:4318"
    depends_on:
      - tempo
    volumes:
      - ./observability/otel-collector/config.yaml:/etc/otelcol-contrib/config.yaml:ro

  promtail:
    image: grafana/promtail:3.2.1
    command: ["-config.file=/etc/promtail/config.yml"]
    depends_on:
      - loki
    volumes:
      - ./observability/promtail/config.yml:/etc/promtail/config.yml:ro
      - ../.logs:/workspace/.logs

  grafana:
    image: grafana/grafana:11.4.0
    ports:
      - "3005:3000"
    depends_on:
      - prometheus
      - loki
      - tempo
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro

volumes:
  pgdata:
  redisdata:
