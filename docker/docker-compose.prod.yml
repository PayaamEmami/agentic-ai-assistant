name: agentic-ai-assistant-prod

x-app-env: &app-env
  NODE_ENV: production
  LOG_LEVEL: ${LOG_LEVEL:-info}
  LOG_FORMAT: json
  LOG_FILE_ENABLED: 'false'
  DATABASE_URL: postgresql://${POSTGRES_USER:-aaa}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-aaa}
  DATABASE_POOL_SIZE: ${DATABASE_POOL_SIZE:-10}
  REDIS_URL: redis://redis:6379
  OTEL_SERVICE_NAMESPACE: ${OTEL_SERVICE_NAMESPACE:-aaa}
  OTEL_RESOURCE_ATTRIBUTES: ${OTEL_RESOURCE_ATTRIBUTES:-deployment.environment=production}
  S3_BUCKET: ${S3_BUCKET}
  S3_REGION: ${S3_REGION:-us-west-1}
  OPENAI_API_KEY: ${OPENAI_API_KEY}
  OPENAI_MODEL: ${OPENAI_MODEL:-gpt-5-mini}
  OPENAI_EMBEDDING_MODEL: ${OPENAI_EMBEDDING_MODEL:-text-embedding-3-small}
  OPENAI_REALTIME_MODEL: ${OPENAI_REALTIME_MODEL:-gpt-realtime-1.5}
  OPENAI_REALTIME_VOICE: ${OPENAI_REALTIME_VOICE:-marin}
  JWT_SECRET: ${JWT_SECRET}
  INTERNAL_SERVICE_SECRET: ${INTERNAL_SERVICE_SECRET}
  INTERNAL_API_BASE_URL: http://api:3001
  WEB_BASE_URL: ${WEB_BASE_URL}
  APP_CREDENTIALS_SECRET: ${APP_CREDENTIALS_SECRET}
  GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
  GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
  GITHUB_APP_REDIRECT_URI_BASE: ${GITHUB_APP_REDIRECT_URI_BASE:-}
  GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
  GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
  GOOGLE_APP_REDIRECT_URI_BASE: ${GOOGLE_APP_REDIRECT_URI_BASE:-}
  DISABLE_REGISTRATION: ${DISABLE_REGISTRATION:-false}

x-logging: &default-logging
  driver: json-file
  options:
    max-size: ${DOCKER_LOG_MAX_SIZE:-10m}
    max-file: ${DOCKER_LOG_MAX_FILES:-5}

services:
  proxy:
    image: caddy:2-alpine
    container_name: aaa-proxy
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    environment:
      CADDY_SITE_ADDRESS: ${CADDY_SITE_ADDRESS:-:80}
    volumes:
      - ./Caddyfile.prod:/etc/caddy/Caddyfile:ro
      - caddydata:/data
      - caddyconfig:/config
    depends_on:
      - web
      - api
    logging: *default-logging

  postgres:
    image: pgvector/pgvector:pg16
    container_name: aaa-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-aaa}
      POSTGRES_USER: ${POSTGRES_USER:-aaa}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ${AAA_DATA_DIR:-/opt/aaa/data}/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}"']
      interval: 10s
      timeout: 5s
      retries: 10
    logging: *default-logging

  redis:
    image: redis:7-alpine
    container_name: aaa-redis
    restart: unless-stopped
    command: ['redis-server', '--appendonly', 'yes']
    volumes:
      - ${AAA_DATA_DIR:-/opt/aaa/data}/redis:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 10
    logging: *default-logging

  migrate:
    image: '${ECR_REGISTRY}/aaa-api:${IMAGE_TAG}'
    container_name: aaa-migrate
    profiles: ['tools']
    working_dir: /app
    command: ['pnpm', '--filter', '@aaa/db', 'migrate:up']
    environment: *app-env
    depends_on:
      postgres:
        condition: service_healthy
    logging: *default-logging

  api:
    image: '${ECR_REGISTRY}/aaa-api:${IMAGE_TAG}'
    container_name: aaa-api
    restart: unless-stopped
    environment:
      <<: *app-env
      API_HOST: 0.0.0.0
      API_PORT: '3001'
      API_INSTANCE_ID: aaa-api-ec2
      API_INTERNAL_BASE_URL: http://api:3001
    expose:
      - '3001'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://127.0.0.1:3001/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging: *default-logging

  worker:
    image: '${ECR_REGISTRY}/aaa-worker:${IMAGE_TAG}'
    container_name: aaa-worker
    restart: unless-stopped
    environment:
      <<: *app-env
      WORKER_OBSERVABILITY_HOST: 0.0.0.0
      WORKER_OBSERVABILITY_PORT: '9464'
    expose:
      - '9464'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://127.0.0.1:9464/health/live').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging: *default-logging

  web:
    image: '${ECR_REGISTRY}/aaa-web:${IMAGE_TAG}'
    container_name: aaa-web
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      WEB_BASE_URL: ${WEB_BASE_URL}
    expose:
      - '3000'
    depends_on:
      api:
        condition: service_healthy
    logging: *default-logging

volumes:
  caddydata:
  caddyconfig:
