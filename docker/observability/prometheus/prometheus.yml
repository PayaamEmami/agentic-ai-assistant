global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: api
    static_configs:
      - targets: ['host.docker.internal:3001']

  - job_name: worker
    static_configs:
      - targets: ['host.docker.internal:9464']

  - job_name: otel-collector
    static_configs:
      - targets: ['otel-collector:8888']
