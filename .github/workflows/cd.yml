name: CD

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  test:
    uses: ./.github/workflows/ci.yml

  build-images:
    needs: test
    runs-on: ubuntu-24.04-arm
    permissions:
      id-token: write
      contents: read
    strategy:
      fail-fast: true
      matrix:
        service: [api, worker, web]
    env:
      AWS_REGION: ${{ secrets.AWS_REGION }}
      ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
      IMAGE_TAG: ${{ github.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push ${{ matrix.service }} image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/${{ matrix.service }}.Dockerfile
          platforms: linux/arm64
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/aaa-${{ matrix.service }}:${{ env.IMAGE_TAG }}
            ${{ env.ECR_REGISTRY }}/aaa-${{ matrix.service }}:latest
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
          build-args: |
            NEXT_PUBLIC_API_URL=${{ secrets.PUBLIC_BASE_URL }}
            WEB_BASE_URL=${{ secrets.PUBLIC_BASE_URL }}
            NEXT_PUBLIC_DISABLE_REGISTRATION=${{ vars.NEXT_PUBLIC_DISABLE_REGISTRATION || 'false' }}

  deploy:
    needs: [test, build-images]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    env:
      AWS_REGION: ${{ secrets.AWS_REGION }}
      DEPLOY_BUCKET: ${{ secrets.DEPLOY_BUCKET }}
      INSTANCE_NAME: ${{ secrets.INSTANCE_NAME }}
      PUBLIC_BASE_URL: ${{ secrets.PUBLIC_BASE_URL }}
      CADDY_SITE_ADDRESS: ':80'
      ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
      IMAGE_TAG: ${{ github.sha }}
    steps:
      - name: Verify ECR_REGISTRY is set
        run: |
          if [[ -z "${ECR_REGISTRY}" ]]; then
            echo "::error::Repository Secret ECR_REGISTRY is not set." >&2
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Materialize .env from secrets
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          INTERNAL_SERVICE_SECRET: ${{ secrets.INTERNAL_SERVICE_SECRET }}
          APP_CREDENTIALS_SECRET: ${{ secrets.APP_CREDENTIALS_SECRET }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          OAUTH_GITHUB_CLIENT_ID: ${{ secrets.OAUTH_GITHUB_CLIENT_ID }}
          OAUTH_GITHUB_CLIENT_SECRET: ${{ secrets.OAUTH_GITHUB_CLIENT_SECRET }}
          OAUTH_GOOGLE_CLIENT_ID: ${{ secrets.OAUTH_GOOGLE_CLIENT_ID }}
          OAUTH_GOOGLE_CLIENT_SECRET: ${{ secrets.OAUTH_GOOGLE_CLIENT_SECRET }}
        run: |
          umask 077
          {
            printf 'OPENAI_API_KEY=%s\n' "$OPENAI_API_KEY"
            printf 'JWT_SECRET=%s\n' "$JWT_SECRET"
            printf 'INTERNAL_SERVICE_SECRET=%s\n' "$INTERNAL_SERVICE_SECRET"
            printf 'APP_CREDENTIALS_SECRET=%s\n' "$APP_CREDENTIALS_SECRET"
            printf 'POSTGRES_PASSWORD=%s\n' "$POSTGRES_PASSWORD"
            printf 'GITHUB_CLIENT_ID=%s\n' "$OAUTH_GITHUB_CLIENT_ID"
            printf 'GITHUB_CLIENT_SECRET=%s\n' "$OAUTH_GITHUB_CLIENT_SECRET"
            printf 'GOOGLE_CLIENT_ID=%s\n' "$OAUTH_GOOGLE_CLIENT_ID"
            printf 'GOOGLE_CLIENT_SECRET=%s\n' "$OAUTH_GOOGLE_CLIENT_SECRET"
            printf 'S3_BUCKET=%s\n' "$DEPLOY_BUCKET"
            printf 'S3_REGION=%s\n' "$AWS_REGION"
          } > .env

      - name: Deploy
        run: bash ./scripts/deploy-aws.sh

      - name: Invalidate CloudFront cache
        env:
          DISTRIBUTION_ID: ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "$DISTRIBUTION_ID" \
            --paths '/*'
