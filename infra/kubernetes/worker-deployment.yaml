apiVersion: apps/v1
kind: Deployment
metadata:
  name: aaa-worker
  namespace: aaa
  labels:
    app: aaa-worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aaa-worker
  template:
    metadata:
      labels:
        app: aaa-worker
      annotations:
        prometheus.io/scrape: 'true'
        prometheus.io/path: '/metrics'
        prometheus.io/port: '9464'
    spec:
      containers:
        - name: worker
          image: aaa-worker:latest
          ports:
            - containerPort: 9464
          envFrom:
            - secretRef:
                name: aaa-secrets
            - configMapRef:
                name: aaa-config
          resources:
            requests:
              memory: '256Mi'
              cpu: '250m'
            limits:
              memory: '512Mi'
              cpu: '500m'
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 9464
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health/live
              port: 9464
            initialDelaySeconds: 15
            periodSeconds: 20
