apiVersion: apps/v1
kind: Deployment
metadata:
  name: aaa-web
  namespace: aaa
  labels:
    app: aaa-web
spec:
  replicas: 2
  selector:
    matchLabels:
      app: aaa-web
  template:
    metadata:
      labels:
        app: aaa-web
    spec:
      containers:
        - name: web
          image: aaa-web:latest
          ports:
            - containerPort: 3000
          env:
            - name: NEXT_PUBLIC_API_URL
              valueFrom:
                configMapKeyRef:
                  name: aaa-config
                  key: API_URL
          resources:
            requests:
              memory: '256Mi'
              cpu: '250m'
            limits:
              memory: '512Mi'
              cpu: '500m'
