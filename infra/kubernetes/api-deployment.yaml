apiVersion: apps/v1
kind: Deployment
metadata:
  name: aaa-api
  namespace: aaa
  labels:
    app: aaa-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: aaa-api
  template:
    metadata:
      labels:
        app: aaa-api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: "3001"
    spec:
      containers:
        - name: api
          image: aaa-api:latest
          ports:
            - containerPort: 3001
          env:
            - name: API_INSTANCE_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: API_INTERNAL_BASE_URL
              value: "http://$(POD_IP):3001"
          envFrom:
            - secretRef:
                name: aaa-secrets
            - configMapRef:
                name: aaa-config
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health/live
              port: 3001
            initialDelaySeconds: 15
            periodSeconds: 20
