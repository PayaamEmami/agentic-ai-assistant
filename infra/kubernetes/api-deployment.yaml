apiVersion: apps/v1
kind: Deployment
metadata:
  name: aaa-api
  namespace: aaa
  labels:
    app: aaa-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: aaa-api
  template:
    metadata:
      labels:
        app: aaa-api
    spec:
      containers:
        - name: api
          image: aaa-api:latest
          ports:
            - containerPort: 3001
          envFrom:
            - secretRef:
                name: aaa-secrets
            - configMapRef:
                name: aaa-config
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 15
            periodSeconds: 20
